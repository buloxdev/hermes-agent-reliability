<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Agent Reliability — Mission Control</title>
  <style>
    :root {
      --bg: #0a0e1a;
      --card: #111827;
      --card-border: rgba(55, 65, 81, 0.5);
      --accent: #3b82f6;
      --danger: #ef4444;
      --warn: #f59e0b;
      --success: #10b981;
      --text: #f9fafb;
      --muted: #6b7280;
      --glow-green: 0 0 20px rgba(16, 185, 129, 0.3);
      --glow-red: 0 0 20px rgba(239, 68, 68, 0.3);
      --glow-yellow: 0 0 20px rgba(245, 158, 11, 0.3);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'SF Mono', 'Cascadia Code', 'Fira Code', monospace;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      background-image:
        radial-gradient(ellipse at 20% 0%, rgba(59, 130, 246, 0.08) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 100%, rgba(139, 92, 246, 0.06) 0%, transparent 50%);
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 32px;
      border-bottom: 1px solid var(--card-border);
      background: rgba(17, 24, 39, 0.8);
      backdrop-filter: blur(12px);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .topbar h1 {
      font-size: 1.1rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .topbar .status-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--success);
      animation: pulse-dot 2s ease-in-out infinite;
    }
    @keyframes pulse-dot {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }
    .topbar .meta { color: var(--muted); font-size: 0.8rem; }
    .topbar a.badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 14px;
      border-radius: 10px;
      background: rgba(59, 130, 246, 0.12);
      color: var(--accent);
      text-decoration: none;
      font-size: 0.8rem;
      font-weight: 600;
      transition: background 0.2s, transform 0.2s;
    }
    .topbar a.badge:hover {
      background: rgba(59, 130, 246, 0.2);
      transform: translateY(-1px);
    }
    .topbar .help-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: rgba(255,255,255,0.05);
      color: var(--muted);
      text-decoration: none;
      font-size: 1rem;
      transition: background 0.2s, transform 0.2s, color 0.2s;
      margin-left: 12px;
    }
    .topbar .help-btn:hover {
      background: rgba(255,255,255,0.1);
      color: var(--text);
      transform: scale(1.1);
    }

    .page { max-width: 1400px; margin: 0 auto; padding: 24px 32px; }

    /* Hero Score Gauge */
    .hero-row {
      display: grid;
      grid-template-columns: 320px 1fr;
      gap: 24px;
      margin-bottom: 28px;
    }
    .gauge-card {
      background: var(--card);
      border: 1px solid var(--card-border);
      border-radius: 20px;
      padding: 28px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }
    .gauge-card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 50% 30%, rgba(59, 130, 246, 0.06), transparent 70%);
    }
    .gauge-label {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      color: var(--muted);
      margin-bottom: 16px;
    }
    .gauge-svg { position: relative; z-index: 1; }
    .gauge-score {
      font-size: 3.2rem;
      font-weight: 800;
      line-height: 1;
    }
    .gauge-subtitle {
      font-size: 0.75rem;
      color: var(--muted);
      margin-top: 8px;
    }

    /* Dimension Cards */
    .dimensions-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
    }
    .dim-card {
      background: var(--card);
      border: 1px solid var(--card-border);
      border-radius: 16px;
      padding: 20px;
      position: relative;
      overflow: hidden;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .dim-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.3);
    }
    .dim-card .dim-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 14px;
    }
    .dim-card .dim-name {
      font-size: 0.8rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
    .dim-card .dim-score {
      font-size: 1.8rem;
      font-weight: 700;
    }
    .dim-bar-track {
      height: 6px;
      background: rgba(255,255,255,0.06);
      border-radius: 999px;
      overflow: hidden;
    }
    .dim-bar-fill {
      height: 100%;
      border-radius: inherit;
      transition: width 1.5s cubic-bezier(0.22, 1, 0.36, 1);
    }
    .dim-detail {
      font-size: 0.7rem;
      color: var(--muted);
      margin-top: 10px;
    }

    /* Radar Chart */
    .radar-card {
      background: var(--card);
      border: 1px solid var(--card-border);
      border-radius: 20px;
      padding: 28px;
      margin-bottom: 28px;
    }
    .radar-card h2 {
      font-size: 0.85rem;
      font-weight: 600;
      margin-bottom: 20px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }
    .radar-container {
      display: flex;
      justify-content: center;
      gap: 60px;
      flex-wrap: wrap;
    }
    .radar-item {
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .radar-item .radar-label {
      font-size: 0.7rem;
      color: var(--muted);
      margin-top: 8px;
    }

    /* Session Fleet */
    .fleet-card {
      background: var(--card);
      border: 1px solid var(--card-border);
      border-radius: 20px;
      padding: 28px;
      margin-bottom: 28px;
    }
    .fleet-card h2 {
      font-size: 0.85rem;
      font-weight: 600;
      margin-bottom: 20px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }
    .fleet-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 14px;
    }
    .session-card {
      background: rgba(255,255,255,0.02);
      border: 1px solid var(--card-border);
      border-radius: 14px;
      padding: 16px;
      cursor: pointer;
      transition: all 0.25s;
      position: relative;
      overflow: hidden;
    }
    .session-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0;
      width: 4px;
      height: 100%;
      border-radius: 4px 0 0 4px;
    }
    .session-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 12px 32px rgba(0,0,0,0.4);
    }
    .session-card::after {
      content: '↗';
      position: absolute;
      top: 8px;
      right: 8px;
      font-size: 0.75rem;
      opacity: 0;
      transition: opacity 0.2s;
      color: var(--accent);
    }
    .session-card:hover::after {
      opacity: 1;
    }
    .session-card .sc-name {
      font-size: 0.75rem;
      font-weight: 600;
      margin-bottom: 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .session-card .sc-score {
      font-size: 2rem;
      font-weight: 800;
      line-height: 1.1;
    }
    .session-card .sc-dims {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 4px;
      margin-top: 10px;
    }
    .session-card .sc-dim {
      text-align: center;
    }
    .session-card .sc-dim-label {
      font-size: 0.55rem;
      color: var(--muted);
      text-transform: uppercase;
      position: relative;
      cursor: default;
    }
    .session-card .sc-dim-label::after {
      content: attr(data-tip);
      position: absolute;
      bottom: 100%;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.9);
      color: #fff;
      font-size: 0.6rem;
      padding: 4px 8px;
      border-radius: 6px;
      white-space: nowrap;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.15s;
      z-index: 10;
    }
    .session-card .sc-dim-label:hover::after {
      opacity: 1;
    }
    .session-card .sc-dim-val {
      font-size: 0.85rem;
      font-weight: 700;
    }

    /* Sparkline History */
    .history-card {
      background: var(--card);
      border: 1px solid var(--card-border);
      border-radius: 20px;
      padding: 28px;
      margin-bottom: 28px;
    }
    .history-card h2 {
      font-size: 0.85rem;
      font-weight: 600;
      margin-bottom: 20px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }
    .sparkline-container { width: 100%; overflow: hidden; }
    #historyCanvas {
      width: 100%;
      height: 220px;
      display: block;
    }

    /* Color helpers */
    .c-good { color: var(--success); }
    .c-warn { color: var(--warn); }
    .c-bad  { color: var(--danger); }

    @media (max-width: 900px) {
      .hero-row { grid-template-columns: 1fr; }
      .dimensions-grid { grid-template-columns: 1fr; }
      .fleet-grid { grid-template-columns: 1fr; }
    }
  
    /* Histogram */
    .histogram-container { display: flex; flex-direction: column; gap: 6px; padding: 16px 0; }
    .hist-bar-container { display: flex; align-items: center; gap: 12px; }
    .hist-label { width: 50px; font-size: 0.75rem; color: var(--muted); text-align: right; font-variant-numeric: tabular-nums; }
    .hist-bar-wrap { flex: 1; position: relative; height: 22px; background: rgba(255,255,255,0.04); border-radius: 6px; overflow: hidden; }
    .hist-bar { height: 100%; border-radius: 6px 0 0 6px; transition: width 0.8s cubic-bezier(0.22,1,0.36,1); }
    .hist-count { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); font-size: 0.75rem; color: var(--text); font-weight: 600; text-shadow: 0 0 4px rgba(0,0,0,0.5); }
    .histogram-legend { display: flex; gap: 20px; font-size: 0.75rem; color: var(--muted); margin-top: 8px; justify-content: center; flex-wrap: wrap; }
</style>
</head>
<body>

<header class="topbar">
  <h1><span class="status-dot"></span> AGENT RELIABILITY — MISSION CONTROL</h1>
  <a href="reports/latest-report.html" class="badge" target="_blank" title="Open latest executive summary">
    <span style="font-size:1.1em">📊</span> Reliability Report
  </a>
  <a href="file:///Users/anthonyaguilar/.hermes/skills/agent-reliability/INVESTIGATE.md" class="help-btn" target="_blank" title="How to investigate low scores">
    ❓
  </a>
  <span class="meta">253 sessions · last updated Apr 22 2026</span>
</header>

<main class="page">
  <div id="alerts-panel" style="display:none;margin-bottom:20px;padding:18px 20px;border-radius:16px;background:rgba(239,68,68,0.06);border:1px solid rgba(239,68,68,0.2)"></div>
  <!-- Hero: Gauge + Dimensions -->
  <section class="hero-row">
    <div class="gauge-card">
      <div class="gauge-label">Composite Score</div>
      <svg class="gauge-svg" width="220" height="140" viewBox="0 0 220 140">
        <!-- Track -->
        <path d="M 20 130 A 90 90 0 0 1 200 130" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="14" stroke-linecap="round"/>
        <!-- Fill (animated) -->
        <path id="gauge-arc" d="M 20 130 A 90 90 0 0 1 200 130" fill="none" stroke="url(#gaugeGrad)" stroke-width="14" stroke-linecap="round"
          stroke-dasharray="283" stroke-dashoffset="283" style="transition: stroke-dashoffset 2s cubic-bezier(0.22, 1, 0.36, 1);"/>
        <defs>
          <linearGradient id="gaugeGrad" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#ef4444"/>
            <stop offset="40%" stop-color="#f59e0b"/>
            <stop offset="100%" stop-color="#10b981"/>
          </linearGradient>
        </defs>
      </svg>
      <div class="gauge-score" id="hero-score">—</div>
      <div class="gauge-subtitle">Top 12 sessions</div>
    </div>

    <div class="dimensions-grid" id="dims-grid">

    </div>
  </section>

  <!-- Radar Comparison -->
  <section class="radar-card">
    <h2>Scenario Comparison</h2>
    <div class="radar-container" id="radar-container">

    </div>
  </section>

  <!-- Session Fleet -->
  <section class="fleet-card">
    <h2 id="fleet-heading">Session Fleet</h2>
    <div class="fleet-grid" id="fleet-grid">
      <!-- Filled by JS -->
    </div>
  </section>

  <!-- Score History Sparkline -->
  <!-- Score Distribution Histogram -->
  <section class="history-card">
    <h2 id="dist-heading">Score Distribution</h2>
    <div class="histogram-container" id="histogram-container">
      <!-- Filled by JS -->
    </div>
    <div class="histogram-legend">
      <span style="color:var(--success)">● 80-100 (Excellent)</span>
      <span style="color:var(--warn)">● 70-79 (Good)</span>

      <span style="color:var(--danger)">● &lt;60 (Critical)</span>
    </div>
  </section>
</main>

<script>
// ─── Reference Benchmarks (static personas) ───
const SCENARIOS = [
  { name: 'Good Agent',           id: 'demo-good-agent',         c: 100,  cr: 100, er: 100, ta: 100, g: 100 },
  { name: 'Mixed Agent',          id: 'demo-mixed-agent',        c: 91.7, cr: 86,   er: 100, ta: 83.3, g: 98 },
  { name: 'Flaky Agent',          id: 'demo-flaky-agent',        c: 57.7, cr: 29,   er: 30,  ta: 73.3, g: 87 },
  { name: 'Hallucinating Agent',  id: 'demo-hallucinating-agent',c: 25.6, cr: 49,   er: 0,   ta: 45,   g: 7 },
];

// ─── Live Data (populated from monitor-report.json) ───
let REPORT = null;

// ─── Helpers ───
function scoreColor(v) {
  if (v >= 80) return '#10b981';
  if (v >= 50) return '#f59e0b';
  return '#ef4444';
}
function scoreGlow(v) {
  if (v >= 80) return 'var(--glow-green)';
  if (v >= 50) return 'var(--glow-yellow)';
  return 'var(--glow-red)';
}
function fmtSessionLabel(sid) {
  if (sid.startsWith('cron_')) return sid;
  if (sid.length > 20) return sid.slice(0, 8) + '...' + sid.slice(-6);
  return sid;
}

// ─── Animate Gauge ───
function animateGauge(score) {
  const arc = document.getElementById('gauge-arc');
  const totalLen = 283;
  const offset = totalLen - (totalLen * score / 100);
  requestAnimationFrame(() => { arc.style.strokeDashoffset = offset; });
  const el = document.getElementById('hero-score');
  el.style.color = scoreColor(score);
  animateNumber(el, 0, score, 1200);
}

function animateNumber(el, from, to, duration) {
  const start = performance.now();
  function tick(now) {
    const t = Math.min((now - start) / duration, 1);
    const ease = 1 - Math.pow(1 - t, 3);
    const val = from + (to - from) * ease;
    el.textContent = val.toFixed(1);
    if (t < 1) requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);
}

// ─── Dimension Cards ───
function renderDimensions(fleet) {
  const dims = [
    { key: 'avg_consistency',    label: 'Consistency',    avg: fleet.avg_consistency },
    { key: 'avg_error_recovery', label: 'Error Recovery', avg: fleet.avg_error_recovery },
    { key: 'avg_tool_accuracy',  label: 'Tool Accuracy',  avg: fleet.avg_tool_accuracy },
    { key: 'avg_grounding',      label: 'Grounding',      avg: fleet.avg_grounding },
  ];
  const grid = document.getElementById('dims-grid');
  grid.innerHTML = dims.map((d, i) => `
    <div class="dim-card" style="animation-delay: ${i * 150}ms">
      <div class="dim-header">
        <span class="dim-name">${d.label}</span>
        <span class="dim-score c-${d.avg >= 80 ? 'good' : d.avg >= 50 ? 'warn' : 'bad'}">${d.avg.toFixed(1)}</span>
      </div>
      <div class="dim-bar-track">
        <div class="dim-bar-fill" style="width: 0%; background: ${scoreColor(d.avg)}" data-target="${d.avg}"></div>
      </div>
      <div class="dim-detail">Fleet average across ${fleet.sessions_scored} sessions</div>
    </div>
  `).join('');

  setTimeout(() => {
    document.querySelectorAll('.dim-bar-fill').forEach(bar => {
      bar.style.width = bar.dataset.target + '%';
    });
  }, 300);
}

// ─── Radar Charts (SVG) ───
function renderRadars() {
  const container = document.getElementById('radar-container');
  container.innerHTML = SCENARIOS.map(s => {
    const cx = 100, cy = 100, r = 70;
    const dims = [s.cr, s.er, s.ta, s.g];
    const labels = ['Consistency', 'Recovery', 'Tool Acc.', 'Grounding'];
    const angles = dims.map((_, i) => (Math.PI * 2 * i / 4) - Math.PI / 2);

    let gridCircles = [25, 50, 75, 100].map(v =>
      `<circle cx="${cx}" cy="${cy}" r="${r * v / 100}" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>`
    ).join('');

    let gridLines = angles.map(a =>
      `<line x1="${cx}" y1="${cy}" x2="${cx + r * Math.cos(a)}" y2="${cy + r * Math.sin(a)}" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>`
    ).join('');

    const points = dims.map((v, i) => {
      const pr = r * v / 100;
      return `${cx + pr * Math.cos(angles[i])},${cy + pr * Math.sin(angles[i])}`;
    }).join(' ');

    let labelEls = labels.map((l, i) => {
      const lr = r + 18;
      const lx = cx + lr * Math.cos(angles[i]);
      const ly = cy + lr * Math.sin(angles[i]);
      return `<text x="${lx}" y="${ly}" fill="#6b7280" font-size="9" text-anchor="middle" dominant-baseline="middle">${l}</text>`;
    }).join('');

    let dots = dims.map((v, i) => {
      const pr = r * v / 100;
      return `<circle cx="${cx + pr * Math.cos(angles[i])}" cy="${cy + pr * Math.sin(angles[i])}" r="4" fill="${scoreColor(v)}"/>`;
    }).join('');

    return `<div class="radar-item">
      <svg width="200" height="200" viewBox="0 0 200 200">
        ${gridCircles}${gridLines}
        <polygon points="${points}" fill="${scoreColor(s.c)}20" stroke="${scoreColor(s.c)}" stroke-width="2"/>
        ${dots}${labelEls}
      </svg>
      <div class="radar-label">${s.name} — <strong style="color:${scoreColor(s.c)}">${s.c.toFixed(1)}</strong></div>
    </div>`;
  }).join('');
}

// ─── Session Fleet ───
function renderFleet(sessions) {
  const grid = document.getElementById('fleet-grid');
  grid.innerHTML = sessions.map(s => {
    const color = scoreColor(s.composite);
    const label = fmtSessionLabel(s.session_id);
    const ts = s.timestamp ? s.timestamp.replace('T', ' ').slice(0, 16) : '';
    return `<div class="session-card" data-session-id="${s.session_id}" onclick="window.open('trace-replay.html?session=${s.session_id}', '_blank')" style="border-left: 4px solid ${color}">
      <div class="sc-name">${label}<span style="color:var(--muted);font-size:0.7rem;margin-left:8px">${ts}</span></div>
      <div class="sc-score" style="color:${color}">${s.composite.toFixed(1)}</div>
      <div class="sc-dims">
        <div class="sc-dim"><div class="sc-dim-label" data-tip="Consistency">C</div><div class="sc-dim-val" style="color:${scoreColor(s.consistency)}">${s.consistency.toFixed(0)}</div></div>
        <div class="sc-dim"><div class="sc-dim-label" data-tip="Error Recovery">R</div><div class="sc-dim-val" style="color:${scoreColor(s.error_recovery)}">${s.error_recovery.toFixed(0)}</div></div>
        <div class="sc-dim"><div class="sc-dim-label" data-tip="Tool Accuracy">T</div><div class="sc-dim-val" style="color:${scoreColor(s.tool_accuracy)}">${s.tool_accuracy.toFixed(0)}</div></div>
        <div class="sc-dim"><div class="sc-dim-label" data-tip="Grounding">G</div><div class="sc-dim-val" style="color:${scoreColor(s.grounding)}">${s.grounding.toFixed(0)}</div></div>
      </div>
    </div>`;
  }).join('');
}

// ─── Distribution Histogram ───
function renderDistribution(distribution) {
  const container = document.getElementById('histogram-container');
  if (!container) return;
  if (!distribution || distribution.length === 0) {
    container.innerHTML = '<div style="color:var(--muted);padding:20px">No distribution data</div>';
    return;
  }

  const bins = {};
  distribution.forEach(v => {
    const b = Math.floor(v / 5) * 5;
    bins[b] = (bins[b] || 0) + 1;
  });
  const maxCount = Math.max(...Object.values(bins));
  const binKeys = Object.keys(bins).map(Number).sort((a, b) => a - b);

  var html = '';
  binKeys.forEach(key => {
    const count = bins[key];
    const pct = (count / maxCount) * 100;
    const color = scoreColor(key + 2.5);
    html += '<div class="hist-bar-container">';
    html += '<div class="hist-label">' + key + '-' + (key + 4) + '</div>';
    html += '<div class="hist-bar-wrap">';
    html += '<div class="hist-bar" style="width:' + pct.toFixed(1) + '%;background:' + color + '"></div>';
    html += '<div class="hist-count">' + count + '</div>';
    html += '</div></div>';
  });
  container.innerHTML = html;
}

// ─── Alerts Panel ───
function renderAlerts(alerts) {
  const panel = document.getElementById('alerts-panel');
  if (!panel) return;
  if (!alerts || alerts.length === 0) {
    panel.style.display = 'none';
    return;
  }
  panel.style.display = 'block';
  var html = '<div style="display:flex;align-items:center;gap:10px;margin-bottom:12px">';
  html += '<span style="width:8px;height:8px;border-radius:50%;background:var(--danger);animation:pulse-dot 2s ease-in-out infinite"></span>';
  html += '<strong style="font-size:0.9rem">' + alerts.length + ' Active Alert' + (alerts.length > 1 ? 's' : '') + '</strong>';
  html += '</div><div style="display:grid;gap:8px">';
  for (var i = 0; i < Math.min(alerts.length, 5); i++) {
    var a = alerts[i];
    html += '<div style="padding:10px 12px;border-radius:10px;background:rgba(239,68,68,0.08);border:1px solid rgba(239,68,68,0.2);font-size:0.82rem">';
    html += '<span style="color:var(--danger);font-weight:700;text-transform:uppercase;font-size:0.7rem;margin-right:6px">' + a.level + '</span>';
    html += a.message;
    html += '</div>';
  }
  if (alerts.length > 5) {
    html += '<div style="color:var(--muted);font-size:0.8rem">+' + (alerts.length - 5) + ' more</div>';
  }
  html += '</div>';
  panel.innerHTML = html;
}

// ─── Load Report ───

  try {
    const res = await fetch('../data/monitor-report.json');
    if (!res.ok) throw new Error('Report not found');

  renderAll();
}
